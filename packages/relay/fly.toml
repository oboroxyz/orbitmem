app = "orbitmem-relay"
primary_region = "nrt"

[build]

[env]
  PORT = "3000"
  RELAY_MODE = "mock"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "relay_data"
  destination = "/app/relay-orbitdb"
